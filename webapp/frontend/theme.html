<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    
    
<div class="sidebar">
<button id="toggleSidebar" class="toggle-btn">☰</button>
  <a href="main.html">🤖Image Analyzer</a>
  <a href="history.html">📜History</a>
  <a href="about.html">⚙ About</a>
</div>
<div class="theme-selector">

  <div class="theme-item">
    <img src="../picture/light.png" alt="Light theme">
    <button onclick="setTheme('light')">🌞 Light</button>
  </div>

  <div class="theme-item">
    <img src="../picture/dark.png" alt="Dark theme">
    <button onclick="setTheme('dark')">🌙 Dark</button>
  </div>

  <div class="theme-item">
    <img src="../picture/neon.png" alt="Neon theme">
    <button onclick="setTheme('neon')">⚡ Neon</button>
  </div>

</div>


</body>
</html>

<script>
  const toggleBtn = document.getElementById("toggleSidebar");
const sidebar = document.querySelector(".sidebar");

if (toggleBtn && sidebar) {
  toggleBtn.addEventListener("click", () => {
    sidebar.classList.toggle("collapsed");
  });
}

 function setTheme(theme) {
    const root = document.documentElement;

    if (theme === 'light') {
        root.style.setProperty('--body-bg', '#f5f5f5');
        root.style.setProperty('--text-color', '#333');
        root.style.setProperty('--header-color', '#290ce8');
        root.style.setProperty('--subheader-color', '#290ce8');
        root.style.setProperty('--container-bg', '#e0e0e0');
        root.style.setProperty('--sidebar-bg', '#d4d4d4');
    } 
    else if (theme === 'dark') {
        root.style.setProperty('--body-bg', '#1e1e1e');
        root.style.setProperty('--text-color', '#f5f5f5');
        root.style.setProperty('--header-color', '#ff9800');
        root.style.setProperty('--subheader-color', '#ff9800');
        root.style.setProperty('--container-bg', '#2b2b2b');
        root.style.setProperty('--sidebar-bg', '#333');
    } 
    else if (theme === 'neon') {
        root.style.setProperty('--body-bg', '#ccc4c4');
        root.style.setProperty('--text-color', '#333');
        root.style.setProperty('--container-bg', '#bba9cf');
        root.style.setProperty('--header-color', '#837cb1');
        root.style.setProperty('--subheader-color', '#796fba');
        root.style.setProperty('--sidebar-bg', '#c482dc');
    }
    
    // Save theme to localStorage
    localStorage.setItem('selectedTheme', theme);
}

// Load saved theme on page load
function loadTheme() {
    const savedTheme = localStorage.getItem('selectedTheme');
    if (savedTheme) {
        setTheme(savedTheme);
    }
    localStorage.setItem('selectedTheme', theme);
}


 window.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('selectedTheme');
        if (savedTheme) {
            setTheme(savedTheme);
        }
    });
</script>
